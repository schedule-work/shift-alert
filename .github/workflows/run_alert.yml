name: Nurse Duty Alert Robot

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch: # 수동 버튼
  repository_dispatch: # <--- 💡 구글 시트 리모컨 신호를 받기 위해 추가
    types: [manual_trigger]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # 최신 환경 강제 적용

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # 최신 파이썬 버전
          
      - name: Install dependencies
        run: pip install gspread oauth2client requests
        
      - name: Run Alert Script
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python nurse_alert.py
